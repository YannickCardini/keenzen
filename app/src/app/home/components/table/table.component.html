<div class="game-board">

  <!-- ===== TIMER (caché sur petits écrans) ===== -->
  <div class="timer-zone">
    <div class="timer-ring" [class.urgent]="timeLeft() <= 10">
      <svg viewBox="0 0 64 64" width="64" height="64">
        <circle class="timer-bg" cx="32" cy="32" r="27.5" />
        <circle class="timer-arc"
          cx="32" cy="32" r="27.5"
          [style.stroke]="timerColor()"
          [style.stroke-dasharray]="timerCircumference"
          [style.stroke-dashoffset]="timerDashOffset()" />
      </svg>
      <div class="timer-display">
        <span class="timer-number" [class.urgent]="timeLeft() <= 10">{{ timeLeft() }}</span>
        <span class="timer-label">sec</span>
      </div>
    </div>
  </div>

  <!-- ===== MAIN DU JOUEUR ===== -->
  <div class="hand-zone">
    <div class="cards-fan">
      @for (card of getPlayerHand(); track card.id; let i = $index) {
        <button
          class="tock-card playable-card"
          [class.selected]="selectedCardIndex() === i"
          [class.is-red]="card.suit === '♥' || card.suit === '♦'"
          [style]="getCardStyle(i, getPlayerHand().length)"
          (click)="onCardSelected(i)">
          <div class="card-inner">
            <div class="card-corner top-left">
              <span class="card-corner-value">{{ card.value }}</span>
              <span class="card-corner-suit">{{ card.suit }}</span>
            </div>
            <div class="card-center-suit">{{ card.suit }}</div>
            <div class="card-corner bottom-right">
              <span class="card-corner-value">{{ card.value }}</span>
              <span class="card-corner-suit">{{ card.suit }}</span>
            </div>
          </div>
        </button>
      } @empty {
        <div class="empty-hand">Votre main est vide</div>
      }
    </div>
  </div>

  <!-- ===== INFOS CONTEXTUELLES (au-dessus du footer, cachées sur petits écrans) ===== -->
  <div class="context-info">
    <span class="turn-phase">
      <span class="phase-dot"></span>
      {{ turnPhase() }}
    </span>
  </div>

  <!-- ===== FOOTER ===== -->
  <div class="control-dashboard">
    <div class="dashboard-grid">

      <div class="player-profile">
        <div class="avatar" [style.background-color]="getPlayerColor()"></div>
        <div class="player-info">
          <span class="label">En train de jouer</span>
          <strong>{{ getPlayerName() }}</strong>
        </div>
      </div>

      <button class="action-btn" [disabled]="!canConfirm()" (click)="confirmMove()">
        Confirmer
      </button>

    </div>
  </div>

</div>
