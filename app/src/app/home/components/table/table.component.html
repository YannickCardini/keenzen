<div class="table-container">
  <!-- Player Hand -->
  <div class="hand-container">
    @for (card of getPlayerHand(); track card.id; let i = $index) {
    <button class="tock-card" [class.selected]="selectedCardIndex() === i"
      [class.is-red]="card.suit === '♥' || card.suit === '♦'" (click)="selectCard(i)">
      <span class="card-value">{{ card.value }}</span>
      <span class="card-suit">{{ card.suit }}</span>
    </button>
    } @empty {
    <div class="empty-hand">No cards in hand</div>
    }
  </div>

</div>
