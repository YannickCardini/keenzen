name: B&D backend to Azure Web App 🖧

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'

      # 1. Build du package partagé en premier — le backend en dépend
      - name: Build shared package
        run: |
          cd packages/shared
          npm install
          npm run build

      # 2. Build du backend en référençant le shared buildé
      - name: Build backend
        run: |
          cd backend
          npm install
          npm run build --if-present

      # 3. On prépare un dossier de déploiement propre :
      #    - le dist/ du backend
      #    - le dist/ du shared (résolu via node_modules/@mercury/shared)
      #    - le package.json du backend (Azure en a besoin pour npm install en prod)
      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r backend/dist        deploy/
          cp    backend/package.json deploy/
          cp    backend/package-lock.json deploy/ 2>/dev/null || true
          # Copie le shared buildé dans node_modules pour qu'Azure le trouve
          mkdir -p deploy/node_modules/@mercury
          cp -r packages/shared/dist deploy/node_modules/@mercury/shared
          cp    packages/shared/package.json deploy/node_modules/@mercury/shared/

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deploy/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1A5C3958CC71423FA3C5C7D03E47C4C0 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A6CF99F7E9B44F87A1F6116776639895 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_6EF14047979F4BFFBD0876E6B4AAF9D9 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'keenzen-api'
          slot-name: 'Production'
          package: .
