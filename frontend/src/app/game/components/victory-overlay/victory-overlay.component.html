<div class="victory-overlay" [attr.data-color]="color()" [class.defeat]="!isWinner()">

  <!-- Confetti — only for the winner -->
  @if (isWinner()) {
    <div class="confetti-container">
      @for (p of particles; track p.id) {
        <div class="confetti-piece" [style]="p.styles"></div>
      }
    </div>
  }

  <!-- Card centrale -->
  <div class="victory-card" [class.by-default]="byDefault()">
    <div class="trophy">{{ byDefault() ? '🏳️' : (isWinner() ? '🏆' : '💀') }}</div>
    <div class="victory-title">{{ isWinner() ? 'Victory!' : 'Defeat' }}</div>
    <div class="winner-row">
      <div class="winner-marble" [class]="'wm-' + color()"></div>
      <div class="winner-name">{{ name() }}</div>
    </div>
    <div class="winner-subtitle">
      @if (byDefault()) {
        All other players have left the game
      } @else {
        {{ isWinner() ? 'won the game!' : 'won the game.' }}
      }
    </div>
  </div>

</div>
