apiVersion: apps/v1
kind: Deployment
metadata:
  name: keezen-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keezen
  template:
    metadata:
      labels:
        app: keezen
    spec:
      containers:
      - name: keezen-game
        image: basicregistrecontainer.azurecr.io/keezen:v2
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 5